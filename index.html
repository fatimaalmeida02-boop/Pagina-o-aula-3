<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Paginação - Aula 03</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: darkslategray;
        }

        .paginacao {
            display: inline-block;
        }

        .paginacao a {
            color: white;
            background-color: #4a69bd;
            padding: 10px 15px;
            text-decoration: none;
            margin: 2px;
            border-radius: 5px;
            display: inline-block;
        }

        .paginacao a:hover {
            background-color: #1e3799;
        }

        .paginacao a.ativo {
            background-color: #1e3799;
        }
    </style>
</head>
<body>

    <h2>Aula 3</h2>

    <div class="paginacao">
        <a href="#">Anterior</a>
        <a href="#">1</a>
        <a href="#">2</a>
        <a href="#">3</a>
        <a href="#">4</a>
        <a href="#">Próximo</a>
    </div>

</body>
</html>
